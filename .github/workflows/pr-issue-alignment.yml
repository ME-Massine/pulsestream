name: PR Issue Alignment

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  pr-issue-alignment:
    name: PR issue alignment
    runs-on: ubuntu-latest

    steps:
      - name: Review PR against linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prBody = pr.body || "";
            const prTitle = pr.title || "";
            const prText = `${prTitle}\n${prBody}`.toLowerCase();

            let failures = [];
            let warnings = [];
            let passes = [];

            const match = prBody.match(
              /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/i
            );

            if (!match) {
              failures.push("Missing linked issue. Add `Closes #123` under **Related Issue**.");
            }

            let issue = null;
            let issueText = "";
            let labels = [];
            let changedFiles = [];

            if (match) {
              const issueNumber = Number(match[1]);

              const issueResp = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });

              issue = issueResp.data;
              issueText = `${issue.title || ""}\n${issue.body || ""}`.toLowerCase();
              labels = (issue.labels || []).map(label =>
                (typeof label === "string" ? label : label.name || "").toLowerCase()
              );

              const files = await github.paginate(
                github.rest.pulls.listFiles,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100
                }
              );

              changedFiles = files.map(file => file.filename.toLowerCase());
              passes.push(`Linked issue detected: #${issueNumber}`);
            }

            const requiredSections = [
              "## summary",
              "## related issue",
              "## changes",
              "## testing",
              "## checklist"
            ];

            for (const section of requiredSections) {
              if (!prBody.toLowerCase().includes(section)) {
                failures.push(`Missing required PR section: \`${section}\``);
              }
            }

            const badPlaceholders = [
              "describe the purpose of this pull request.",
              "describe how this was tested."
            ];

            for (const text of badPlaceholders) {
              if (prBody.toLowerCase().includes(text)) {
                failures.push(`PR still contains template placeholder text: "${text}"`);
              }
            }

            if (issue) {
              const touchesDocs = changedFiles.some(file =>
                file.startsWith("docs/") || file.endsWith(".md")
              );

              const touchesWorkflows = changedFiles.some(file =>
                file.startsWith(".github/workflows/")
              );

              const touchesJava = changedFiles.some(file =>
                file.endsWith(".java") ||
                file.includes("pom.xml") ||
                file.includes("src/main/") ||
                file.includes("src/test/")
              );

              const touchesTests = changedFiles.some(file =>
                file.includes("src/test/") ||
                file.includes("/test/") ||
                file.endsWith("test.java") ||
                file.endsWith("tests.java") ||
                file.endsWith(".spec.ts") ||
                file.endsWith(".test.ts") ||
                file.endsWith(".spec.js") ||
                file.endsWith(".test.js")
              );

              if (
                labels.includes("docs") ||
                issueText.includes("documentation") ||
                issueText.includes("docs")
              ) {
                if (!touchesDocs) {
                  failures.push("Issue looks docs-related, but no docs files were changed.");
                } else {
                  passes.push("Docs-related issue matched with docs changes.");
                }
              }

              if (
                labels.includes("ci") ||
                labels.includes("github-actions") ||
                issueText.includes("workflow") ||
                issueText.includes("github actions") ||
                issueText.includes("ci")
              ) {
                if (!touchesWorkflows) {
                  failures.push("Issue looks CI-related, but no workflow files were changed.");
                } else {
                  passes.push("CI-related issue matched with workflow changes.");
                }
              }

              if (
                labels.includes("backend") ||
                labels.includes("java") ||
                issueText.includes("service") ||
                issueText.includes("controller") ||
                issueText.includes("repository")
              ) {
                if (!touchesJava) {
                  failures.push("Issue looks backend-related, but no backend/Java files were changed.");
                } else {
                  passes.push("Backend-related issue matched with backend/Java changes.");
                }
              }

              const issueMentionsTests =
                issueText.includes("test") ||
                issueText.includes("tests") ||
                issueText.includes("coverage");

              const prMentionsTests =
                prText.includes("test") ||
                prText.includes("tests");

              if (issueMentionsTests) {
                if (!touchesTests && !prMentionsTests) {
                  failures.push("Issue mentions tests, but this PR does not add or describe test work.");
                } else {
                  passes.push("Test requirement appears addressed.");
                }
              }

              if (changedFiles.length > 30) {
                warnings.push(`This PR changes ${changedFiles.length} files. Review scope carefully.`);
              }
            }

            const bodyLines = [
              "## PR Issue Alignment Review",
              "",
              failures.length ? "### Failures" : "### Result"
            ];

            if (failures.length) {
              for (const failure of failures) {
                bodyLines.push(`- ${failure}`);
              }
            } else {
              bodyLines.push("- No blocking alignment issues detected.");
            }

            if (passes.length) {
              bodyLines.push("", "### Checks passed");
              for (const pass of passes) {
                bodyLines.push(`- ${pass}`);
              }
            }

            if (warnings.length) {
              bodyLines.push("", "### Warnings");
              for (const warning of warnings) {
                bodyLines.push(`- ${warning}`);
              }
            }

            const commentBody = bodyLines.join("\n");

            // Non-annoying behavior: update the existing bot comment instead of creating a new one every time
            const marker = "<!-- pr-issue-alignment-review -->";
            const finalBody = `${marker}\n${commentBody}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existingComment = comments.find(comment =>
              comment.user?.type === "Bot" &&
              typeof comment.body === "string" &&
              comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: finalBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: finalBody
              });
            }

            if (failures.length) {
              core.setFailed(`PR failed alignment review with ${failures.length} issue(s).`);
            }