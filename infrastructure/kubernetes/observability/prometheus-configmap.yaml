apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      # Discovers pods in this namespace and scrapes any pod that carries
      # prometheus.io/scrape: "true" (set on ingestion-service and
      # telemetry-processor in their Deployment pod templates).
      - job_name: pulsestream-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["pulsestream"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: replace
            target_label: component
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
