# Non-sensitive runtime configuration for the ingestion-service.
#
# These keys were previously inlined as `env` in deployment.yaml. Externalizing
# them into a ConfigMap lets operators change runtime config without editing or
# rebuilding the Deployment, and keeps the Deployment manifest reusable across
# environments (#136).
#
# Every value here is non-sensitive by definition: cluster-internal endpoints
# and log levels. Anything sensitive (credentials, tokens) must live in the
# companion Secret (secret.yaml), never here.
#
# Keys use the container's environment-variable names. The application reads
# them through Spring relaxed binding (application.yml), so the ConfigMap stays
# the single place to tune runtime behavior per environment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-service-config
  labels:
    app.kubernetes.io/name: ingestion-service
    app.kubernetes.io/component: ingest-gateway
    app.kubernetes.io/part-of: pulsestream
data:
  # In-cluster Kafka bootstrap endpoint. Overrides the localhost default baked
  # into application.yml. Adjust to match the Kafka Service in the cluster.
  PULSESTREAM_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  # Root and application log levels. Non-sensitive; exposed here so verbosity can
  # be tuned per environment without an image rebuild.
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_PULSESTREAM_INGESTION: "INFO"
