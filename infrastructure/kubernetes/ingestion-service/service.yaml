apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: ingestion-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: ingestion-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
# Cluster-external access for local kubectl/minikube/kind workflows, per
# issue #30 ("expose ingestion API via NodePort or Ingress"). The Ingress in
# networking/ingestion-ingress.yaml is the preferred path when an ingress
# controller is available.
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service-nodeport
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: ingestion-service
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: ingestion-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
