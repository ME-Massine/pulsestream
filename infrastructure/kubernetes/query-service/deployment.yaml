# Kubernetes Deployment for the query-service read API.
#
# Image, tag, and registry conventions follow
# docs/architecture/container-image-registry.md. The image is pinned to an
# immutable per-commit tag (sha-<short>) rather than `latest`, which the doc
# marks as mutable and unfit for reproducible deploys. Bump this tag to the
# sha-<short> of the main commit you want to roll out.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  labels:
    app.kubernetes.io/name: query-service
    app.kubernetes.io/component: query-api
    app.kubernetes.io/part-of: pulsestream
spec:
  # Stateless read API: two replicas give basic availability during node
  # drains and rolling updates. Autoscaling is intentionally out of scope (#135).
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: query-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query-service
        app.kubernetes.io/component: query-api
        app.kubernetes.io/part-of: pulsestream
    spec:
      # GHCR packages default to private; a `ghcr-pull` secret with read:packages
      # is required unless the package is made public. See the registry doc.
      # A missing secret only warns for a public image, so this stays safe either way.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        # The image (Dockerfile `USER spring`) runs as uid/gid 999. Kubelet can
        # only verify runAsNonRoot against a numeric user, so the UID is pinned
        # explicitly; relying on the named `spring` user fails at container
        # start with "cannot verify user is non-root".
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: query-service
          image: ghcr.io/me-massine/pulsestream/query-service:sha-5969ed2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          # Runtime configuration is externalized (#136): non-sensitive values
          # come from the ConfigMap (configmap.yaml). query-service reads no
          # credentials today, so there is no companion Secret to reference.
          envFrom:
            - configMapRef:
                name: query-service-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Spring Boot Actuator health endpoint (exposed in application.yml).
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
