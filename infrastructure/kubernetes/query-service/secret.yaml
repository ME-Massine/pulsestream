# Secret TEMPLATE for the query-service — sensitive runtime configuration.
#
# Purpose (#136): establish where sensitive values live and how the Deployment
# references them, so credentials are never hardcoded in the Deployment or the
# ConfigMap.
#
# This manifest is a template, not a ready-to-apply Secret:
#   * The values below are placeholders. Do NOT commit real credentials to git.
#   * Populate real values out-of-band (sealed-secrets, an external secret
#     manager, or `kubectl create secret`), all of which are out of scope here.
#   * The Deployment's `secretRef` is intentionally left COMMENTED until the
#     service actually consumes a sensitive value, so applying this template
#     as-is cannot inject placeholder junk into a running container.
#
# query-service is a read API and consumes no secret yet. The example below is
# the realistic first sensitive value (PostgreSQL credentials for the read path)
# and shows the expected key shape for when that lands.
apiVersion: v1
kind: Secret
metadata:
  name: query-service-secret
  labels:
    app.kubernetes.io/name: query-service
    app.kubernetes.io/component: query-api
    app.kubernetes.io/part-of: pulsestream
type: Opaque
# stringData keeps the template human-readable (Kubernetes base64-encodes it on
# apply). Replace every REPLACE_ME before use; never commit real values.
stringData:
  # Example only — not yet read by the application. Kept commented so the
  # template documents intent without shipping unused keys.
  # PULSESTREAM_POSTGRES_USERNAME: "REPLACE_ME"
  # PULSESTREAM_POSTGRES_PASSWORD: "REPLACE_ME"
  PLACEHOLDER: "REPLACE_ME"
