# Non-sensitive runtime configuration for the query-service.
#
# Externalizing runtime config into a ConfigMap (#136) lets operators tune the
# service per environment without editing or rebuilding the Deployment, keeping
# the Deployment manifest reusable.
#
# query-service is a read API that consumes no sensitive configuration today, so
# it has no companion Secret. If it later reads from a datastore, those
# credentials go in a Secret, never in this ConfigMap.
#
# Keys use the container's environment-variable names; the application binds
# them through Spring relaxed binding (application.yml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: query-service-config
  labels:
    app.kubernetes.io/name: query-service
    app.kubernetes.io/component: query-api
    app.kubernetes.io/part-of: pulsestream
data:
  # Root and application log levels. Tunable per environment without an image
  # rebuild. LOGGING_LEVEL_COM_PULSESTREAM_QUERY maps to
  # logging.level.com.pulsestream.query via Spring relaxed binding.
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_PULSESTREAM_QUERY: "INFO"
