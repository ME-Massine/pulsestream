# Development default credentials, matching infrastructure/docker/.env.example.
# Override before deploying to a shared or production cluster.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: admin
