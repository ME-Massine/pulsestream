# Development default credentials, matching infrastructure/docker/.env.example.
# Override with real secret values (or a sealed-secret / external-secret) before
# deploying to a shared or production cluster.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_DB: pulsestream
  POSTGRES_USER: pulsestream
  POSTGRES_PASSWORD: pulsestream
