apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-processor
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: telemetry-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: telemetry-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: pulsestream
        app.kubernetes.io/component: telemetry-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: telemetry-processor
          image: pulsestream/telemetry-processor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: telemetry-processor-config
          env:
            - name: PULSESTREAM_POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: PULSESTREAM_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1
              memory: 768Mi
