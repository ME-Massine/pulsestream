# EXAMPLE ONLY — DO NOT APPLY THIS FILE AS-IS.
#
# Template for the telemetry-processor Secret (#136). telemetry-processor is the
# only platform service that reads credentials: the PostgreSQL datasource
# username and password (services/telemetry-processor .../application.yml).
#
# Real credentials are NEVER committed. This file ships placeholder values only
# and exists to document the required Secret name and keys. The real Secret is
# provisioned out-of-band, e.g.:
#
#   kubectl create secret generic telemetry-processor-secret \
#     --from-literal=PULSESTREAM_POSTGRES_USERNAME=<user> \
#     --from-literal=PULSESTREAM_POSTGRES_PASSWORD=<password>
#
# The Deployment references this Secret by name via `envFrom.secretRef`, so the
# manifest stays reusable across environments. Sealed secrets, an external
# secret manager, and Vault are out of scope for #136.
#
# A rendered `secret.yaml` in this directory is git-ignored (see root
# .gitignore) so real credentials cannot be committed by accident.
apiVersion: v1
kind: Secret
metadata:
  name: telemetry-processor-secret
  labels:
    app.kubernetes.io/name: telemetry-processor
    app.kubernetes.io/component: stream-processor
    app.kubernetes.io/part-of: pulsestream
type: Opaque
# Placeholders only — replace out-of-band, never commit real values.
stringData:
  PULSESTREAM_POSTGRES_USERNAME: "REPLACE_ME"
  PULSESTREAM_POSTGRES_PASSWORD: "REPLACE_ME"
