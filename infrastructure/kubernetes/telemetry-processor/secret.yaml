# Sensitive runtime configuration for the telemetry-processor.
#
# telemetry-processor is the only platform service that reads credentials today:
# the PostgreSQL datasource username and password (application.yml). Keeping
# them here (#136) means they are never hardcoded in the Deployment or the
# ConfigMap, and the Deployment references the Secret by name so it stays
# reusable across environments.
#
# The values below are the local-stack defaults already baked into
# application.yml as fallbacks (username/password "pulsestream"), committed here
# only so the local cluster works out of the box. They are NOT production
# credentials. For any real environment, override this Secret out-of-band
# (`kubectl create secret generic telemetry-processor-secret ...`). Sealed
# secrets, an external secret manager, and Vault are out of scope for #136.
apiVersion: v1
kind: Secret
metadata:
  name: telemetry-processor-secret
  labels:
    app.kubernetes.io/name: telemetry-processor
    app.kubernetes.io/component: stream-processor
    app.kubernetes.io/part-of: pulsestream
type: Opaque
# stringData keeps the manifest human-readable (Kubernetes base64-encodes it on
# apply). Replace these before use in any non-local environment.
stringData:
  PULSESTREAM_POSTGRES_USERNAME: "pulsestream"
  PULSESTREAM_POSTGRES_PASSWORD: "pulsestream"
