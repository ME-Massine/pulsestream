apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: pulsestream
  labels:
    app.kubernetes.io/part-of: pulsestream
    app.kubernetes.io/component: kafka-topics-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: pulsestream
        app.kubernetes.io/component: kafka-topics-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics-init
          image: confluentinc/cp-kafka:7.6.1
          command: ["/bin/bash", "/scripts/init-topics.sh"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVER
              value: kafka:29092
            - name: KAFKA_REPLICATION_FACTOR
              value: "1"
          volumeMounts:
            - name: init-script
              mountPath: /scripts
      volumes:
        - name: init-script
          configMap:
            name: kafka-init-script
            defaultMode: 0755
