name: pulsestream-local

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: pulsestream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat >/dev/tcp/localhost/2181' && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsestream-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: pulsestream-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
      - "${KAFKA_INTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - pulsestream-net

  postgres:
    image: postgres:16
    container_name: pulsestream-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulsestream}
      POSTGRES_USER: ${POSTGRES_USER:-pulsestream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsestream}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulsestream} -d ${POSTGRES_DB:-pulsestream}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsestream-net

  redis:
    image: redis:7
    container_name: pulsestream-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pulsestream-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pulsestream-prometheus
    depends_on:
      - kafka
      - postgres
      - redis
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - pulsestream-net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: pulsestream-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - pulsestream-net


  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pulsestream-postgres-exporter
    environment:
      DATA_SOURCE_URI: "postgres:5432/${POSTGRES_DB:-pulsestream}?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_USER:-pulsestream}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:-pulsestream}
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pulsestream-net

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pulsestream-redis-exporter 
    environment: 
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pulsestream-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: pulsestream-kafka-exporter
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "9308:9308" 
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pulsestream-net

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  pulsestream-net:
    driver: bridge
